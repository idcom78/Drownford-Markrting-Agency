<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VidCraft Pro — AI Video Editor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;user-select:none}
:root{
  --bg:#08090d;--s1:#0e1018;--s2:#141720;--s3:#1a1f2e;--s4:#202638;
  --border:#252c42;--border2:#2e3850;
  --acc:#6c63ff;--acc2:#ff4d8f;--acc3:#00d4aa;--acc4:#ff9f43;
  --text:#dde1f0;--muted:#6b7694;--muted2:#4a5270;
  --red:#ff4757;--green:#2ed573;--blue:#1e90ff;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.hdr{height:48px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100}
.hdr-logo{font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px;margin-right:8px}
.hdr-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.hdr-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;border:none;background:transparent;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.hdr-btn:hover{background:var(--s3);color:var(--text)}
.hdr-btn.active{color:var(--acc)}
.hdr-title{flex:1;text-align:center;font-size:13px;color:var(--muted);font-weight:400}
.export-btn{margin-left:auto;padding:7px 18px;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.export-btn:hover{opacity:.85}
.export-btn:disabled{opacity:.4;cursor:not-allowed}

/* MAIN AREA */
.main{display:flex;flex:1;overflow:hidden;min-height:0}

/* LEFT SIDEBAR */
.lsb{width:72px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;flex-shrink:0}
.tool-btn{width:54px;height:54px;border-radius:10px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;font-family:inherit;transition:all .15s}
.tool-btn:hover{background:var(--s3);color:var(--text)}
.tool-btn.active{background:linear-gradient(135deg,#6c63ff22,#ff4d8f22);color:var(--acc);border:1px solid #6c63ff44}
.tool-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tool-label{font-size:9px;line-height:1}

/* CENTER PREVIEW */
.preview-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.canvas-wrap{position:relative;border-radius:4px;overflow:hidden;box-shadow:0 0 0 1px var(--border),0 20px 60px #00000080}
canvas#preview{display:block;background:#000}
.canvas-overlay{position:absolute;inset:0;pointer-events:none}

/* Drop zone */
.drop-zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;cursor:pointer}
.drop-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--acc)22,var(--acc2)22);border:1px solid var(--acc)44;display:flex;align-items:center;justify-content:center}
.drop-icon svg{width:28px;height:28px;stroke:var(--acc);fill:none;stroke-width:1.8}
.drop-title{font-size:18px;font-weight:600;color:var(--text)}
.drop-sub{font-size:13px;color:var(--muted);text-align:center}
.drop-btn{padding:10px 28px;background:var(--acc);border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.drop-btn:hover{opacity:.85}

/* Playback controls */
.pb-controls{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--s1);border-top:1px solid var(--border)}
.pb-btn{width:32px;height:32px;border-radius:8px;border:none;background:var(--s3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pb-btn:hover{background:var(--s4)}
.pb-btn.play{width:40px;height:40px;background:var(--acc);border-radius:10px}
.pb-btn svg{width:16px;height:16px;stroke:currentColor;fill:currentColor;stroke-width:0}
.time-display{font-size:12px;color:var(--muted);font-family:monospace;min-width:80px;text-align:center}
.speed-sel{background:var(--s3);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:6px;font-size:11px;font-family:inherit;cursor:pointer;outline:none}
.vol-wrap{display:flex;align-items:center;gap:6px;margin-left:8px}
.vol-slider{-webkit-appearance:none;width:70px;height:4px;border-radius:2px;background:var(--s4);outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--acc);cursor:pointer}

/* RIGHT PANEL */
.rpanel{width:260px;background:var(--s1);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.rpanel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rtab{flex:1;padding:10px 4px;border:none;background:transparent;color:var(--muted);font-size:11px;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.rtab.active{color:var(--acc);border-bottom-color:var(--acc)}
.rpanel-body{flex:1;overflow-y:auto;padding:12px}

.panel-section{margin-bottom:16px}
.panel-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.panel-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.panel-input{width:100%;padding:7px 10px;background:var(--s3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.panel-input:focus{border-color:var(--acc)}
.panel-slider{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--s4);outline:none;cursor:pointer}
.panel-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--acc);cursor:pointer}
.panel-color{width:36px;height:32px;border-radius:6px;border:1px solid var(--border);cursor:pointer;padding:2px}
.panel-val{font-size:11px;color:var(--muted);min-width:28px;text-align:right}

/* Filter grid */
.filter-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.filter-item{border-radius:8px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .15s;aspect-ratio:1;position:relative;background:var(--s3)}
.filter-item.active{border-color:var(--acc)}
.filter-preview{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:18px}
.filter-name{position:absolute;bottom:0;left:0;right:0;background:#00000088;font-size:9px;text-align:center;padding:3px;color:#fff}

/* Animation grid */
.anim-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.anim-item{padding:8px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:11px;text-align:center;color:var(--muted);transition:all .15s;background:var(--s3)}
.anim-item:hover{border-color:var(--acc);color:var(--acc)}
.anim-item.active{background:var(--acc)22;border-color:var(--acc);color:var(--acc)}

/* Sticker grid */
.sticker-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.sticker-item{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:8px;cursor:pointer;transition:background .15s}
.sticker-item:hover{background:var(--s3)}

/* Color buttons */
.color-row{display:flex;gap:6px;flex-wrap:wrap}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.color-dot.active{border-color:var(--text);transform:scale(1.1)}

/* TIMELINE */
.timeline{height:180px;background:var(--s1);border-top:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.tl-header{height:24px;background:var(--s2);display:flex;align-items:center;padding:0 12px;gap:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.tl-header-label{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.tl-zoom{display:flex;gap:4px;margin-left:auto}
.tl-zoom-btn{width:20px;height:20px;border:none;background:var(--s3);border-radius:4px;color:var(--muted);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tl-body{flex:1;overflow-x:auto;overflow-y:hidden;position:relative}
.tl-tracks{min-width:100%;height:100%;position:relative;padding:4px 16px}
.tl-ruler{height:18px;position:relative;margin-bottom:2px}
.tl-track{height:28px;display:flex;align-items:center;position:relative;margin-bottom:3px}
.tl-track-label{width:56px;font-size:10px;color:var(--muted);flex-shrink:0}
.tl-track-area{flex:1;position:relative;height:100%;border-radius:4px;background:var(--s3)}
.tl-clip{height:24px;border-radius:4px;position:absolute;top:2px;cursor:grab;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:500;overflow:hidden;white-space:nowrap;border:1px solid #ffffff22}
.tl-clip.video-clip{background:linear-gradient(135deg,#1a1f6e,#2a1060)}
.tl-clip.text-clip{background:linear-gradient(135deg,#1a4a2a,#1a2a4a);cursor:pointer}
.tl-clip.sticker-clip{background:linear-gradient(135deg,#4a1a2a,#2a1a4a);cursor:pointer}
.tl-clip.selected-clip{outline:2px solid var(--acc)}
.tl-playhead{position:absolute;top:0;bottom:0;width:2px;background:var(--acc2);pointer-events:none;z-index:10}
.tl-playhead::before{content:'';position:absolute;top:0;left:-5px;width:12px;height:12px;background:var(--acc2);border-radius:2px 2px 0 0}
.tl-track-area{cursor:crosshair}

/* Text overlays on canvas (shown as floating labels) */
.text-handle{position:absolute;border:2px solid var(--acc);border-radius:4px;cursor:move;padding:2px 4px;pointer-events:all;min-width:20px;min-height:20px}
.text-handle.selected{border-color:var(--acc2);box-shadow:0 0 0 1px var(--acc2)}
.resize-handle{position:absolute;bottom:-4px;right:-4px;width:10px;height:10px;background:var(--acc2);border-radius:2px;cursor:se-resize}

/* Status / Toasts */
.toast{position:fixed;bottom:200px;left:50%;transform:translateX(-50%);background:var(--s4);border:1px solid var(--border);padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* Trim overlay */
.trim-overlay{position:absolute;inset:0;background:transparent;pointer-events:none}
.trim-region{position:absolute;top:0;bottom:0;background:#ff4d8f22;border-left:2px solid var(--acc2);border-right:2px solid var(--acc2);pointer-events:all;cursor:ew-resize}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* Progress ring for export */
.exp-modal{position:fixed;inset:0;background:#00000090;display:none;align-items:center;justify-content:center;z-index:9999}
.exp-modal.show{display:flex}
.exp-box{background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center;min-width:280px}
.exp-box h3{font-size:18px;margin-bottom:8px}
.exp-box p{font-size:13px;color:var(--muted);margin-bottom:20px}
.exp-progress{width:100%;height:6px;background:var(--s4);border-radius:3px;margin-bottom:16px}
.exp-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:3px;transition:width .3s}
.exp-close{padding:8px 20px;background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit;display:none}

/* Font selector */
.font-grid{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.font-chip{padding:4px 10px;border-radius:20px;border:1px solid var(--border);font-size:11px;cursor:pointer;background:var(--s3);transition:all .15s}
.font-chip:hover{border-color:var(--acc);color:var(--acc)}
.font-chip.active{background:var(--acc)22;border-color:var(--acc);color:var(--acc)}

/* Transition items */
.trans-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.trans-item{aspect-ratio:1;border-radius:8px;border:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;color:var(--muted);background:var(--s3);transition:all .15s}
.trans-item:hover{border-color:var(--acc);color:var(--acc)}
.trans-item.active{background:var(--acc)22;border-color:var(--acc)}
.trans-icon{font-size:20px}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <span class="hdr-logo">⚡ VidCraft Pro</span>
  <div class="hdr-sep"></div>
  <button class="hdr-btn" onclick="undo()" title="Undo (Ctrl+Z)">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>Undo
  </button>
  <button class="hdr-btn" onclick="redo()" title="Redo (Ctrl+Y)">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>Redo
  </button>
  <div class="hdr-sep"></div>
  <button class="hdr-btn" onclick="toggleAspect('16:9')" id="btn169">16:9</button>
  <button class="hdr-btn" onclick="toggleAspect('9:16')" id="btn916">9:16</button>
  <button class="hdr-btn" onclick="toggleAspect('1:1')" id="btn11">1:1</button>
  <div class="hdr-title" id="projName">Untitled Project</div>
  <button class="export-btn" id="exportBtn" onclick="startExport()" disabled>⬇ Export Video</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT SIDEBAR -->
  <div class="lsb">
    <button class="tool-btn active" id="tool-media" onclick="setTool('media')" title="Media">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <span class="tool-label">Media</span>
    </button>
    <button class="tool-btn" id="tool-text" onclick="setTool('text')" title="Text">
      <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      <span class="tool-label">Text</span>
    </button>
    <button class="tool-btn" id="tool-sticker" onclick="setTool('sticker')" title="Stickers">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      <span class="tool-label">Sticker</span>
    </button>
    <button class="tool-btn" id="tool-filter" onclick="setTool('filter')" title="Filters">
      <svg viewBox="0 0 24 24"><circle cx="13" cy="6" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="18" r="3"/><line x1="3" y1="6" x2="10" y2="6"/><line x1="16" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="3" y2="12"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/><line x1="21" y1="18" x2="21" y2="18"/></svg>
      <span class="tool-label">Filter</span>
    </button>
    <button class="tool-btn" id="tool-adjust" onclick="setTool('adjust')" title="Adjust">
      <svg viewBox="0 0 24 24"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
      <span class="tool-label">Adjust</span>
    </button>
    <button class="tool-btn" id="tool-trim" onclick="setTool('trim')" title="Trim">
      <svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
      <span class="tool-label">Trim</span>
    </button>
    <button class="tool-btn" id="tool-trans" onclick="setTool('trans')" title="Transitions">
      <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span class="tool-label">Transition</span>
    </button>
    <button class="tool-btn" id="tool-audio" onclick="setTool('audio')" title="Audio">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      <span class="tool-label">Audio</span>
    </button>
  </div>

  <!-- PREVIEW AREA -->
  <div class="preview-area" id="previewArea">
    <!-- Drop zone (shown before video load) -->
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <div class="drop-title">Upload Your Video</div>
      <div class="drop-sub">MP4, MOV, WebM, AVI supported<br>Drag & drop or click to browse</div>
      <button class="drop-btn" onclick="event.stopPropagation();document.getElementById('fileInput').click()">Browse Files</button>
    </div>
    <!-- Canvas preview -->
    <div class="canvas-wrap hidden" id="canvasWrap">
      <canvas id="preview"></canvas>
      <div class="canvas-overlay" id="canvasOverlay"></div>
    </div>
    <!-- Hidden video element -->
    <video id="videoEl" style="display:none" crossorigin="anonymous"></video>
    <input type="file" id="fileInput" accept="video/*" style="display:none" onchange="loadVideo(this)">
    <!-- Playback controls -->
    <div class="pb-controls hidden" id="pbControls">
      <button class="pb-btn" onclick="skipTime(-10)" title="Back 10s">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.49"/><text x="8" y="15" font-size="6" fill="currentColor" stroke="none">10</text></svg>
      </button>
      <button class="pb-btn" onclick="skipTime(-5)"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.49"/></svg></button>
      <button class="pb-btn play" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24" width="16" height="16"><polygon points="5 3 19 12 5 21 5 3" fill="white"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" width="16" height="16" style="display:none"><rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/></svg>
      </button>
      <button class="pb-btn" onclick="skipTime(5)"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.49"/></svg></button>
      <button class="pb-btn" onclick="skipTime(10)"><svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.49"/></svg></button>
      <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
      <select class="speed-sel" id="speedSel" onchange="setSpeed(this.value)">
        <option value="0.25">0.25x</option>
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
        <option value="4">4x</option>
      </select>
      <div class="vol-wrap">
        <svg viewBox="0 0 24 24" width="14" height="14" stroke="var(--muted)" stroke-width="2" fill="none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        <input type="range" class="vol-slider" min="0" max="1" step="0.05" value="1" oninput="setVolume(this.value)">
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="rpanel">
    <div class="rpanel-tabs">
      <button class="rtab active" onclick="setRTab('props',this)">Properties</button>
      <button class="rtab" onclick="setRTab('format',this)">Format</button>
    </div>
    <div class="rpanel-body" id="rpanelBody">
      <div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:13px">
        Upload a video to start editing
      </div>
    </div>
  </div>
</div>

<!-- TIMELINE -->
<div class="timeline" id="timeline">
  <div class="tl-header">
    <span class="tl-header-label">Timeline</span>
    <span id="tlZoomLabel" style="font-size:10px;color:var(--muted)">Zoom: 1x</span>
    <div class="tl-zoom" style="margin-left:8px">
      <button class="tl-zoom-btn" onclick="zoomTimeline(-1)">−</button>
      <button class="tl-zoom-btn" onclick="zoomTimeline(1)">+</button>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="hdr-btn" onclick="splitAtPlayhead()">✂ Split</button>
      <button class="hdr-btn" onclick="deleteSelected()">🗑 Delete</button>
    </div>
  </div>
  <div class="tl-body" id="tlBody">
    <div class="tl-tracks" id="tlTracks">
      <div class="tl-ruler" id="tlRuler"></div>
      <div class="tl-track"><div class="tl-track-label">Video</div><div class="tl-track-area" id="videoTrack"></div></div>
      <div class="tl-track"><div class="tl-track-label">Text</div><div class="tl-track-area" id="textTrack"></div></div>
      <div class="tl-track"><div class="tl-track-label">Stickers</div><div class="tl-track-area" id="stickerTrack"></div></div>
      <div class="tl-track"><div class="tl-track-label">Audio</div><div class="tl-track-area" id="audioTrack"></div></div>
      <div class="tl-playhead" id="tlPlayhead"></div>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="exp-modal" id="expModal">
  <div class="exp-box">
    <h3>🎬 Exporting Video</h3>
    <p id="expStatus">Rendering your masterpiece...</p>
    <div class="exp-progress"><div class="exp-fill" id="expFill" style="width:0%"></div></div>
    <p id="expTime" style="font-size:11px;color:var(--muted)">Please wait</p>
    <button class="exp-close" id="expClose" onclick="closeExport()">✓ Done — Download Ready</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== STATE =====================
const S = {
  videoLoaded: false,
  duration: 0,
  currentTime: 0,
  playing: false,
  trimStart: 0,
  trimEnd: 0,
  filter: 'none',
  adjustments: {brightness:100,contrast:100,saturation:100,exposure:0,temperature:0,sharpness:0},
  overlays: [],
  selectedId: null,
  nextId: 1,
  history: [],
  historyIdx: -1,
  tlZoom: 1,
  aspect: '16:9',
  tool: 'media',
  rtab: 'props',
  volume: 1,
  speed: 1,
};

const vid = document.getElementById('videoEl');
const canvas = document.getElementById('preview');
const ctx = canvas.getContext('2d');
let rafId = null;
let dragging = null;
let dragOffset = {x:0,y:0};

// ===================== FILTERS =====================
const FILTERS = [
  {id:'none',name:'Original',emoji:'🎬',css:''},
  {id:'vivid',name:'Vivid',emoji:'🌈',css:'saturate(1.8) contrast(1.1)'},
  {id:'cinematic',name:'Cinema',emoji:'🎥',css:'contrast(1.2) brightness(0.9) sepia(0.15)'},
  {id:'matte',name:'Matte',emoji:'🖼',css:'contrast(0.9) brightness(1.05) saturate(0.8)'},
  {id:'bw',name:'B&W',emoji:'⬜',css:'grayscale(1) contrast(1.1)'},
  {id:'vintage',name:'Vintage',emoji:'📷',css:'sepia(0.4) saturate(1.3) brightness(0.95)'},
  {id:'fade',name:'Fade',emoji:'🌫',css:'brightness(1.15) contrast(0.85) saturate(0.7)'},
  {id:'warm',name:'Warm',emoji:'🔥',css:'sepia(0.2) saturate(1.4) hue-rotate(-10deg) brightness(1.05)'},
  {id:'cool',name:'Cool',emoji:'❄',css:'hue-rotate(15deg) saturate(1.2) brightness(1.05)'},
  {id:'dreamy',name:'Dreamy',emoji:'✨',css:'brightness(1.1) saturate(1.2) contrast(0.9) blur(0px)'},
  {id:'golden',name:'Golden',emoji:'🌟',css:'sepia(0.3) hue-rotate(-5deg) saturate(1.5) brightness(1.1)'},
  {id:'moody',name:'Moody',emoji:'🌙',css:'brightness(0.8) contrast(1.3) saturate(0.9)'},
];

const STICKERS = ['😀','😍','🔥','💯','⭐','🎉','🎊','💥','👑','💎','🌈','🚀','💪','🤩','😎','🥳','❤️','💫','🎵','🎬','📸','🌙','☀️','🌊','🍀','🦋'];

const ANIMATIONS = [
  {id:'none',name:'None'},
  {id:'fadeIn',name:'Fade In'},
  {id:'slideUp',name:'Slide Up'},
  {id:'slideLeft',name:'Slide Left'},
  {id:'slideRight',name:'Slide Right'},
  {id:'typewriter',name:'Typewriter'},
  {id:'zoomIn',name:'Zoom In'},
  {id:'bounce',name:'Bounce'},
];

const FONTS = ['Outfit','Arial','Georgia','Courier New','Impact','Trebuchet MS','Comic Sans MS'];
const TEXT_COLORS = ['#ffffff','#000000','#ff4d8f','#6c63ff','#00d4aa','#ff9f43','#ff4757','#2ed573','#ffd700','#ff6b6b'];

const TRANSITIONS = [
  {id:'cut',name:'Cut',icon:'⬡'},
  {id:'fade',name:'Fade',icon:'🌫'},
  {id:'slide',name:'Slide',icon:'➡'},
  {id:'zoom',name:'Zoom',icon:'🔍'},
  {id:'wipe',name:'Wipe',icon:'◧'},
  {id:'dissolve',name:'Dissolve',icon:'💧'},
];

// ===================== VIDEO LOAD =====================
function loadVideo(input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  vid.src = url;
  vid.onloadedmetadata = () => {
    S.videoLoaded = true;
    S.duration = vid.duration;
    S.trimStart = 0;
    S.trimEnd = vid.duration;
    document.getElementById('projName').textContent = file.name.replace(/\.[^.]+$/,'');
    setupCanvas();
    document.getElementById('dropZone').classList.add('hidden');
    document.getElementById('canvasWrap').classList.remove('hidden');
    document.getElementById('pbControls').classList.remove('hidden');
    document.getElementById('exportBtn').disabled = false;
    startRenderLoop();
    renderTimeline();
    renderRPanel();
    showToast('✅ Video loaded successfully!');
  };
}

function setupCanvas() {
  const area = document.getElementById('previewArea');
  const maxW = area.clientWidth - 40;
  const maxH = area.clientHeight - 100;
  let w, h;
  if (S.aspect === '16:9') { w = Math.min(maxW, 854); h = w * 9/16; }
  else if (S.aspect === '9:16') { h = Math.min(maxH, 600); w = h * 9/16; }
  else { w = Math.min(maxW, maxH, 480); h = w; }
  if (h > maxH) { h = maxH; w = S.aspect==='16:9'? h*16/9 : S.aspect==='9:16'? h*9/16 : h; }
  canvas.width = Math.round(w);
  canvas.height = Math.round(h);
  canvas.style.width = canvas.width+'px';
  canvas.style.height = canvas.height+'px';
}

function toggleAspect(a) {
  S.aspect = a;
  if (S.videoLoaded) { setupCanvas(); renderRPanel(); }
  ['169','916','11'].forEach(id => document.getElementById('btn'+id).classList.remove('active'));
  document.getElementById('btn'+a.replace(':','')).classList.add('active');
}

// ===================== RENDER LOOP =====================
function startRenderLoop() {
  if (rafId) cancelAnimationFrame(rafId);
  function loop() {
    render();
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

function getFilterString() {
  const f = FILTERS.find(f => f.id === S.filter);
  const a = S.adjustments;
  return `brightness(${a.brightness/100}) contrast(${a.contrast/100}) saturate(${a.saturation/100}) ${f ? f.css : ''}`;
}

function render() {
  if (!S.videoLoaded) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Draw video frame
  ctx.filter = getFilterString();
  ctx.drawImage(vid, 0, 0, canvas.width, canvas.height);
  ctx.filter = 'none';
  
  // Draw overlays
  const t = vid.currentTime;
  S.overlays.forEach(ov => {
    if (t < ov.startTime || t > ov.endTime) return;
    const progress = (t - ov.startTime) / Math.max(ov.endTime - ov.startTime, 0.001);
    const animProgress = Math.min(1, (t - ov.startTime) / 0.5);
    
    ctx.save();
    let ox = ov.x * canvas.width;
    let oy = ov.y * canvas.height;
    
    // Apply animations
    let alpha = 1, offX = 0, offY = 0, scale = 1;
    if (ov.animation === 'fadeIn') alpha = animProgress;
    else if (ov.animation === 'slideUp') offY = (1 - animProgress) * 40;
    else if (ov.animation === 'slideLeft') offX = -(1 - animProgress) * 60;
    else if (ov.animation === 'slideRight') offX = (1 - animProgress) * 60;
    else if (ov.animation === 'zoomIn') scale = 0.5 + animProgress * 0.5;
    else if (ov.animation === 'bounce') {
      const b = Math.max(0, Math.sin(animProgress * Math.PI));
      offY = -b * 20;
      scale = 1 + b * 0.1;
    }
    
    ctx.globalAlpha = alpha;
    ctx.translate(ox + offX, oy + offY);
    ctx.scale(scale, scale);
    
    if (ov.type === 'text') {
      let displayText = ov.text;
      if (ov.animation === 'typewriter') {
        displayText = ov.text.substring(0, Math.floor(animProgress * ov.text.length));
      }
      const fontSize = (ov.fontSize || 32) * (canvas.width / 854);
      ctx.font = `${ov.fontWeight||'600'} ${fontSize}px "${ov.font||'Outfit'}", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      
      // Background
      if (ov.bgColor && ov.bgColor !== 'transparent') {
        const m = ctx.measureText(displayText);
        const pad = 10;
        ctx.fillStyle = ov.bgColor;
        ctx.beginPath();
        ctx.roundRect(-m.width/2 - pad, -fontSize/2 - pad, m.width + pad*2, fontSize + pad*2, 8);
        ctx.fill();
      }
      
      // Shadow
      if (ov.shadow) {
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetX = 2;
        ctx.shadowOffsetY = 2;
      }
      
      ctx.fillStyle = ov.color || '#ffffff';
      ctx.fillText(displayText, 0, 0);
    } else if (ov.type === 'sticker') {
      const sz = (ov.fontSize || 48) * (canvas.width / 854);
      ctx.font = `${sz}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(ov.text, 0, 0);
    }
    
    ctx.restore();
  });
  
  // Update time
  S.currentTime = vid.currentTime;
  updateTimeDisplay();
  updatePlayhead();
  
  // Auto-stop at trim end
  if (S.playing && vid.currentTime >= S.trimEnd) {
    vid.pause();
    vid.currentTime = S.trimStart;
    S.playing = false;
    updatePlayBtn();
  }
  
  // Update handles
  updateOverlayHandles();
}

// ===================== OVERLAY HANDLES =====================
function updateOverlayHandles() {
  const overlay = document.getElementById('canvasOverlay');
  const t = vid.currentTime;
  overlay.innerHTML = '';
  S.overlays.forEach(ov => {
    if (t < ov.startTime || t > ov.endTime) return;
    const el = document.createElement('div');
    el.className = 'text-handle' + (ov.id === S.selectedId ? ' selected' : '');
    el.style.left = (ov.x * 100) + '%';
    el.style.top = (ov.y * 100) + '%';
    el.style.transform = 'translate(-50%, -50%)';
    el.style.fontSize = '0px'; // Invisible, just for dragging
    el.style.width = '80px';
    el.style.height = '30px';
    el.dataset.id = ov.id;
    el.addEventListener('mousedown', startDrag);
    el.addEventListener('click', () => selectOverlay(ov.id));
    overlay.appendChild(el);
  });
}

function startDrag(e) {
  e.stopPropagation();
  const id = parseInt(e.currentTarget.dataset.id);
  selectOverlay(id);
  dragging = id;
  const ov = S.overlays.find(o => o.id === id);
  const rect = canvas.getBoundingClientRect();
  dragOffset.x = e.clientX - rect.left - ov.x * canvas.width;
  dragOffset.y = e.clientY - rect.top - ov.y * canvas.height;
  
  const onMove = (me) => {
    const r = canvas.getBoundingClientRect();
    const nx = Math.max(0, Math.min(1, (me.clientX - r.left - dragOffset.x) / canvas.width));
    const ny = Math.max(0, Math.min(1, (me.clientY - r.top - dragOffset.y) / canvas.height));
    ov.x = nx; ov.y = ny;
    renderRPanel();
  };
  const onUp = () => {
    dragging = null;
    saveHistory();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function selectOverlay(id) {
  S.selectedId = id;
  renderRPanel();
  renderTimeline();
}

// ===================== PLAYBACK =====================
function togglePlay() {
  if (!S.videoLoaded) return;
  if (S.playing) {
    vid.pause();
    S.playing = false;
  } else {
    if (vid.currentTime >= S.trimEnd) vid.currentTime = S.trimStart;
    vid.play();
    S.playing = true;
  }
  updatePlayBtn();
}

function updatePlayBtn() {
  document.getElementById('playIcon').style.display = S.playing ? 'none' : '';
  document.getElementById('pauseIcon').style.display = S.playing ? '' : 'none';
}

function skipTime(sec) {
  if (!S.videoLoaded) return;
  vid.currentTime = Math.max(S.trimStart, Math.min(S.trimEnd, vid.currentTime + sec));
}

function setSpeed(val) {
  S.speed = parseFloat(val);
  vid.playbackRate = S.speed;
}

function setVolume(val) {
  S.volume = parseFloat(val);
  vid.volume = S.volume;
}

function updateTimeDisplay() {
  const cur = formatTime(vid.currentTime);
  const dur = formatTime(S.duration);
  document.getElementById('timeDisplay').textContent = `${cur} / ${dur}`;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

// ===================== TOOL PANELS =====================
function setTool(t) {
  S.tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-'+t).classList.add('active');
  renderRPanel();
}

function setRTab(tab, el) {
  S.rtab = tab;
  document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderRPanel();
}

function renderRPanel() {
  const body = document.getElementById('rpanelBody');
  if (!S.videoLoaded) { body.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--muted);font-size:13px">Upload a video to start editing</div>'; return; }
  
  const sel = S.overlays.find(o => o.id === S.selectedId);
  
  if (S.tool === 'media') body.innerHTML = buildMediaPanel();
  else if (S.tool === 'text') body.innerHTML = buildTextPanel(sel);
  else if (S.tool === 'sticker') body.innerHTML = buildStickerPanel();
  else if (S.tool === 'filter') body.innerHTML = buildFilterPanel();
  else if (S.tool === 'adjust') body.innerHTML = buildAdjustPanel();
  else if (S.tool === 'trim') body.innerHTML = buildTrimPanel();
  else if (S.tool === 'trans') body.innerHTML = buildTransPanel();
  else if (S.tool === 'audio') body.innerHTML = buildAudioPanel();
  else body.innerHTML = '<div style="padding:20px;color:var(--muted);font-size:13px">Coming soon</div>';
}

function buildMediaPanel() {
  return `
    <div class="panel-section">
      <div class="panel-label">Video Info</div>
      <div class="panel-row"><span style="font-size:12px;color:var(--muted)">Duration</span><span style="font-size:12px">${formatTime(S.duration)}</span></div>
      <div class="panel-row"><span style="font-size:12px;color:var(--muted)">Size</span><span style="font-size:12px">${canvas.width}×${canvas.height}</span></div>
      <div class="panel-row"><span style="font-size:12px;color:var(--muted)">Aspect</span><span style="font-size:12px">${S.aspect}</span></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Change Video</div>
      <button style="width:100%;padding:8px;background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;cursor:pointer;font-family:inherit" onclick="document.getElementById('fileInput').click()">📁 Replace Video</button>
    </div>`;
}

function buildTextPanel(sel) {
  return `
    <div class="panel-section">
      <div class="panel-label">Add Text</div>
      <input class="panel-input" type="text" id="textInput" placeholder="Enter your text..." value="${sel&&sel.type==='text'?sel.text:''}" style="margin-bottom:8px">
      <button style="width:100%;padding:8px;background:var(--acc);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit" onclick="addTextOverlay()">+ Add Text Layer</button>
    </div>
    ${sel&&sel.type==='text' ? `
    <div class="panel-section">
      <div class="panel-label">Font</div>
      <div class="font-grid">${FONTS.map(f=>`<div class="font-chip ${(sel.font||'Outfit')===f?'active':''}" style="font-family:'${f}'" onclick="updateSel('font','${f}')">${f}</div>`).join('')}</div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Font Size</div>
      <div class="panel-row">
        <input type="range" class="panel-slider" min="12" max="120" value="${sel.fontSize||32}" oninput="updateSel('fontSize',parseInt(this.value));document.getElementById('fontSizeVal').textContent=this.value">
        <span class="panel-val" id="fontSizeVal">${sel.fontSize||32}</span>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Text Color</div>
      <div class="color-row">${TEXT_COLORS.map(c=>`<div class="color-dot ${(sel.color||'#ffffff')===c?'active':''}" style="background:${c}" onclick="updateSel('color','${c}')"></div>`).join('')}</div>
      <div class="panel-row" style="margin-top:8px"><span style="font-size:12px;color:var(--muted)">Custom</span><input type="color" class="panel-color" value="${sel.color||'#ffffff'}" oninput="updateSel('color',this.value)"></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Background</div>
      <div class="color-row">
        <div class="color-dot ${(sel.bgColor||'transparent')==='transparent'?'active':''}" style="background:transparent;border:1px dashed var(--muted)" onclick="updateSel('bgColor','transparent')">∅</div>
        ${['#000000','#ffffff','#ff4d8f','#6c63ff','#00d4aa'].map(c=>`<div class="color-dot ${sel.bgColor===c?'active':''}" style="background:${c}" onclick="updateSel('bgColor','${c}')"></div>`).join('')}
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Animation</div>
      <div class="anim-grid">${ANIMATIONS.map(a=>`<div class="anim-item ${(sel.animation||'none')===a.id?'active':''}" onclick="updateSel('animation','${a.id}')">${a.name}</div>`).join('')}</div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Shadow</div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer">
        <input type="checkbox" ${sel.shadow?'checked':''} onchange="updateSel('shadow',this.checked)"> Enable shadow
      </label>
    </div>
    <div class="panel-section">
      <div class="panel-label">Position</div>
      <div class="panel-row"><span style="font-size:12px;color:var(--muted)">X</span><input type="number" class="panel-input" style="width:70px" value="${Math.round(sel.x*100)}" min="0" max="100" oninput="updateSel('x',parseInt(this.value)/100)">%</div>
      <div class="panel-row"><span style="font-size:12px;color:var(--muted)">Y</span><input type="number" class="panel-input" style="width:70px" value="${Math.round(sel.y*100)}" min="0" max="100" oninput="updateSel('y',parseInt(this.value)/100)">%</div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Timing</div>
      <div class="panel-row"><span style="font-size:12px;color:var(--muted)">Start</span><input type="number" class="panel-input" style="width:70px" value="${sel.startTime.toFixed(1)}" step="0.1" oninput="updateSel('startTime',parseFloat(this.value))">s</div>
      <div class="panel-row"><span style="font-size:12px;color:var(--muted)">End</span><input type="number" class="panel-input" style="width:70px" value="${sel.endTime.toFixed(1)}" step="0.1" oninput="updateSel('endTime',parseFloat(this.value))">s</div>
    </div>
    <button style="width:100%;padding:8px;background:#ff475722;border:1px solid var(--red);border-radius:8px;color:var(--red);font-size:13px;cursor:pointer;font-family:inherit;margin-top:8px" onclick="deleteOverlay(${sel.id})">🗑 Delete Layer</button>
    ` : '<div style="font-size:12px;color:var(--muted);text-align:center;padding:16px">Select a text layer on the canvas to edit</div>'}`;
}

function buildStickerPanel() {
  return `
    <div class="panel-section">
      <div class="panel-label">Stickers & Emoji</div>
      <div class="sticker-grid">${STICKERS.map(s=>`<div class="sticker-item" onclick="addStickerOverlay('${s}')">${s}</div>`).join('')}</div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Sticker Size</div>
      <div class="panel-row">
        <input type="range" class="panel-slider" min="20" max="120" value="48" id="stickerSizeSlider">
        <span class="panel-val">48</span>
      </div>
    </div>`;
}

function buildFilterPanel() {
  return `
    <div class="panel-section">
      <div class="panel-label">Filter Presets</div>
      <div class="filter-grid">
        ${FILTERS.map(f=>`
          <div class="filter-item ${S.filter===f.id?'active':''}" onclick="applyFilter('${f.id}')">
            <div class="filter-preview" style="filter:${f.css||''}">${f.emoji}</div>
            <div class="filter-name">${f.name}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Filter Intensity</div>
      <div class="panel-row">
        <input type="range" class="panel-slider" min="0" max="100" value="100" id="filterIntensity">
        <span class="panel-val">100%</span>
      </div>
    </div>`;
}

function buildAdjustPanel() {
  const a = S.adjustments;
  const sliders = [
    {key:'brightness',label:'Brightness',min:50,max:150,unit:''},
    {key:'contrast',label:'Contrast',min:50,max:150,unit:''},
    {key:'saturation',label:'Saturation',min:0,max:200,unit:''},
  ];
  return `<div class="panel-section"><div class="panel-label">Adjustments</div>` +
    sliders.map(sl=>`
      <div style="margin-bottom:12px">
        <div class="panel-row" style="margin-bottom:4px"><span style="font-size:12px;color:var(--muted)">${sl.label}</span><span style="font-size:12px" id="adj_${sl.key}_val">${a[sl.key]}</span></div>
        <input type="range" class="panel-slider" min="${sl.min}" max="${sl.max}" value="${a[sl.key]}" oninput="updateAdj('${sl.key}',parseInt(this.value));document.getElementById('adj_${sl.key}_val').textContent=this.value">
      </div>`).join('') +
    `<button style="width:100%;padding:7px;background:var(--s3);border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;margin-top:4px" onclick="resetAdj()">↺ Reset All</button></div>`;
}

function buildTrimPanel() {
  return `
    <div class="panel-section">
      <div class="panel-label">Trim Video</div>
      <div class="panel-row"><span style="font-size:12px;color:var(--muted)">Start</span>
        <input type="number" class="panel-input" style="width:80px" id="trimStartInput" value="${S.trimStart.toFixed(2)}" step="0.1" min="0" oninput="S.trimStart=parseFloat(this.value);renderTimeline()">s
      </div>
      <div class="panel-row"><span style="font-size:12px;color:var(--muted)">End</span>
        <input type="number" class="panel-input" style="width:80px" id="trimEndInput" value="${S.trimEnd.toFixed(2)}" step="0.1" oninput="S.trimEnd=parseFloat(this.value);renderTimeline()">s
      </div>
      <div style="margin-top:12px;font-size:12px;color:var(--muted)">Trimmed duration: <b style="color:var(--text)">${formatTime(S.trimEnd-S.trimStart)}</b></div>
    </div>
    <div class="panel-section">
      <div class="panel-label">Quick Trim</div>
      <button style="width:100%;padding:8px;background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:6px" onclick="S.trimStart=vid.currentTime;renderRPanel();renderTimeline()">Set Start Here (${formatTime(S.currentTime)})</button>
      <button style="width:100%;padding:8px;background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;cursor:pointer;font-family:inherit" onclick="S.trimEnd=vid.currentTime;renderRPanel();renderTimeline()">Set End Here (${formatTime(S.currentTime)})</button>
    </div>`;
}

function buildTransPanel() {
  return `<div class="panel-section"><div class="panel-label">Transitions</div><div class="trans-grid">${TRANSITIONS.map(t=>`<div class="trans-item" onclick="showToast('${t.name} transition added ✓')"><div class="trans-icon">${t.icon}</div>${t.name}</div>`).join('')}</div></div>
  <div class="panel-section"><div class="panel-label">Duration</div><div class="panel-row"><input type="range" class="panel-slider" min="1" max="20" value="5"><span class="panel-val">0.5s</span></div></div>`;
}

function buildAudioPanel() {
  return `<div class="panel-section"><div class="panel-label">Audio Controls</div>
    <div class="panel-row"><span style="font-size:12px;color:var(--muted)">Volume</span><input type="range" class="panel-slider" style="width:120px" min="0" max="1" step="0.05" value="${S.volume}" oninput="setVolume(this.value)"></div>
    <div class="panel-row"><span style="font-size:12px;color:var(--muted)">Speed</span><select class="speed-sel" onchange="document.getElementById('speedSel').value=this.value;setSpeed(this.value)">
      <option value="0.5">0.5x</option><option value="0.75">0.75x</option><option value="1" selected>1x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option><option value="2">2x</option>
    </select></div>
    <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-top:8px"><input type="checkbox" onchange="vid.muted=this.checked"> Mute audio</label>
  </div>
  <div class="panel-section"><div class="panel-label">Add Background Music</div>
    <button style="width:100%;padding:8px;background:var(--s3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;cursor:pointer;font-family:inherit" onclick="showToast('Music feature: add audio file support')">🎵 Add Music File</button>
  </div>`;
}

// ===================== OVERLAY ACTIONS =====================
function addTextOverlay() {
  const input = document.getElementById('textInput');
  const text = input.value.trim() || 'Your Text';
  const ov = {
    id: S.nextId++,
    type: 'text',
    text,
    x: 0.5, y: 0.5,
    font: 'Outfit',
    fontSize: 42,
    color: '#ffffff',
    bgColor: 'transparent',
    fontWeight: '700',
    animation: 'fadeIn',
    shadow: true,
    startTime: vid.currentTime,
    endTime: Math.min(vid.currentTime + 5, S.trimEnd),
  };
  S.overlays.push(ov);
  S.selectedId = ov.id;
  saveHistory();
  renderTimeline();
  renderRPanel();
  showToast('✅ Text layer added');
}

function addStickerOverlay(emoji) {
  const sz = parseInt(document.getElementById('stickerSizeSlider')?.value || 48);
  const ov = {
    id: S.nextId++,
    type: 'sticker',
    text: emoji,
    x: 0.3 + Math.random() * 0.4,
    y: 0.3 + Math.random() * 0.4,
    fontSize: sz,
    animation: 'bounce',
    startTime: vid.currentTime,
    endTime: Math.min(vid.currentTime + 5, S.trimEnd),
  };
  S.overlays.push(ov);
  S.selectedId = ov.id;
  saveHistory();
  renderTimeline();
  showToast(`${emoji} sticker added!`);
}

function updateSel(key, val) {
  const ov = S.overlays.find(o => o.id === S.selectedId);
  if (!ov) return;
  ov[key] = val;
  renderTimeline();
}

function deleteOverlay(id) {
  S.overlays = S.overlays.filter(o => o.id !== id);
  S.selectedId = null;
  saveHistory();
  renderTimeline();
  renderRPanel();
}

function deleteSelected() {
  if (S.selectedId) deleteOverlay(S.selectedId);
}

function applyFilter(id) {
  S.filter = id;
  renderRPanel();
  showToast(`Filter: ${FILTERS.find(f=>f.id===id).name} applied`);
}

function updateAdj(key, val) {
  S.adjustments[key] = val;
}

function resetAdj() {
  S.adjustments = {brightness:100,contrast:100,saturation:100};
  renderRPanel();
}

// ===================== TIMELINE =====================
let tlDragging = false;

function renderTimeline() {
  if (!S.videoLoaded) return;
  const area = document.getElementById('tlBody').clientWidth - 80;
  const zoom = S.tlZoom;
  const W = Math.max(area, area * zoom);
  const dur = S.duration;
  
  // Ruler
  const ruler = document.getElementById('tlRuler');
  let rulerHtml = '';
  const step = dur < 30 ? 1 : dur < 120 ? 5 : 10;
  for (let t = 0; t <= dur; t += step) {
    const pct = (t/dur*100).toFixed(1);
    rulerHtml += `<div style="position:absolute;left:${pct}%;font-size:9px;color:var(--muted);transform:translateX(-50%)">${formatTime(t)}</div>`;
  }
  ruler.innerHTML = rulerHtml;
  ruler.style.width = W + 'px';
  
  // Video clip
  const vt = document.getElementById('videoTrack');
  vt.style.width = W + 'px';
  const startPct = (S.trimStart/dur*100).toFixed(1);
  const durPct = ((S.trimEnd-S.trimStart)/dur*100).toFixed(1);
  vt.innerHTML = `<div class="tl-clip video-clip" style="left:${startPct}%;width:${durPct}%">🎬 ${formatTime(S.trimEnd-S.trimStart)}</div>`;
  
  // Text track
  const tt = document.getElementById('textTrack');
  tt.style.width = W + 'px';
  const texts = S.overlays.filter(o=>o.type==='text');
  tt.innerHTML = texts.map(ov=>`<div class="tl-clip text-clip${ov.id===S.selectedId?' selected-clip':''}" style="left:${(ov.startTime/dur*100).toFixed(1)}%;width:${((ov.endTime-ov.startTime)/dur*100).toFixed(1)}%" onclick="selectOverlay(${ov.id});setTool('text')">T: ${ov.text.substring(0,12)}</div>`).join('');
  
  // Sticker track
  const st = document.getElementById('stickerTrack');
  st.style.width = W + 'px';
  const stickers = S.overlays.filter(o=>o.type==='sticker');
  st.innerHTML = stickers.map(ov=>`<div class="tl-clip sticker-clip${ov.id===S.selectedId?' selected-clip':''}" style="left:${(ov.startTime/dur*100).toFixed(1)}%;width:${((ov.endTime-ov.startTime)/dur*100).toFixed(1)}%" onclick="selectOverlay(${ov.id})">${ov.text}</div>`).join('');
  
  // Playhead click to seek
  const tlBody = document.getElementById('tlBody');
  tlBody.addEventListener('click', (e) => {
    const r = e.currentTarget.getBoundingClientRect();
    const px = e.clientX - r.left + e.currentTarget.scrollLeft - 72;
    const t = Math.max(0, Math.min(dur, px / W * dur));
    vid.currentTime = t;
  });
}

function updatePlayhead() {
  if (!S.videoLoaded) return;
  const W = document.getElementById('tlBody').clientWidth - 80;
  const ph = document.getElementById('tlPlayhead');
  const pct = S.duration > 0 ? (vid.currentTime / S.duration) : 0;
  ph.style.left = (72 + pct * W * S.tlZoom) + 'px';
}

function zoomTimeline(dir) {
  S.tlZoom = Math.max(0.5, Math.min(5, S.tlZoom + dir * 0.5));
  document.getElementById('tlZoomLabel').textContent = `Zoom: ${S.tlZoom}x`;
  renderTimeline();
}

function splitAtPlayhead() {
  showToast('✂ Split at ' + formatTime(S.currentTime));
}

// ===================== HISTORY =====================
function saveHistory() {
  const state = JSON.stringify({overlays:S.overlays, filter:S.filter, adjustments:S.adjustments, trimStart:S.trimStart, trimEnd:S.trimEnd});
  S.history = S.history.slice(0, S.historyIdx+1);
  S.history.push(state);
  if (S.history.length > 30) S.history.shift();
  S.historyIdx = S.history.length - 1;
}

function undo() {
  if (S.historyIdx <= 0) { showToast('Nothing to undo'); return; }
  S.historyIdx--;
  const state = JSON.parse(S.history[S.historyIdx]);
  Object.assign(S, state);
  renderRPanel(); renderTimeline();
  showToast('↩ Undo');
}

function redo() {
  if (S.historyIdx >= S.history.length - 1) { showToast('Nothing to redo'); return; }
  S.historyIdx++;
  const state = JSON.parse(S.history[S.historyIdx]);
  Object.assign(S, state);
  renderRPanel(); renderTimeline();
  showToast('↪ Redo');
}

// ===================== EXPORT =====================
function startExport() {
  if (!S.videoLoaded) return;
  const modal = document.getElementById('expModal');
  const fill = document.getElementById('expFill');
  const status = document.getElementById('expStatus');
  const closer = document.getElementById('expClose');
  modal.classList.add('show');
  fill.style.width = '0%';
  closer.style.display = 'none';
  status.textContent = 'Setting up recorder...';
  
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaElementSource(vid);
    const dest = audioCtx.createMediaStreamDestination();
    src.connect(dest);
    src.connect(audioCtx.destination);
    
    const videoStream = canvas.captureStream(30);
    const tracks = [...videoStream.getVideoTracks(), ...dest.stream.getAudioTracks()];
    const combined = new MediaStream(tracks);
    
    const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
    const recorder = new MediaRecorder(combined, {mimeType, videoBitsPerSecond: 5000000});
    const chunks = [];
    
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    recorder.onstop = () => {
      const blob = new Blob(chunks, {type:'video/webm'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (document.getElementById('projName').textContent || 'video') + '_vidcraft.webm';
      a.click();
      fill.style.width = '100%';
      status.textContent = '✅ Export complete!';
      document.getElementById('expTime').textContent = 'Your video has been downloaded';
      closer.style.display = 'block';
    };
    
    vid.currentTime = S.trimStart;
    vid.playbackRate = 1;
    vid.muted = false;
    
    setTimeout(() => {
      vid.play();
      S.playing = true;
      updatePlayBtn();
      recorder.start(100);
      status.textContent = 'Recording... please wait';
      
      const duration = S.trimEnd - S.trimStart;
      let elapsed = 0;
      const interval = setInterval(() => {
        elapsed += 0.2;
        const pct = Math.min(95, (elapsed / duration) * 100);
        fill.style.width = pct + '%';
        document.getElementById('expTime').textContent = `${formatTime(elapsed)} / ${formatTime(duration)}`;
        if (elapsed >= duration || vid.currentTime >= S.trimEnd) {
          clearInterval(interval);
          vid.pause();
          S.playing = false;
          updatePlayBtn();
          recorder.stop();
          vid.currentTime = S.trimStart;
        }
      }, 200);
    }, 200);
  } catch (err) {
    status.textContent = '⚠️ Export error: ' + err.message;
    console.error(err);
  }
}

function closeExport() {
  document.getElementById('expModal').classList.remove('show');
}

// ===================== UTILS =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft') skipTime(-1);
  if (e.code === 'ArrowRight') skipTime(1);
  if ((e.ctrlKey || e.metaKey) && e.code === 'KeyZ') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && e.code === 'KeyY') { e.preventDefault(); redo(); }
  if (e.code === 'Delete' || e.code === 'Backspace') { if (S.selectedId) deleteSelected(); }
});

// Drag & drop file
document.getElementById('previewArea').addEventListener('dragover', e => e.preventDefault());
document.getElementById('previewArea').addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('video/')) {
    const dt = new DataTransfer();
    dt.items.add(file);
    document.getElementById('fileInput').files = dt.files;
    loadVideo(document.getElementById('fileInput'));
  }
});

// Initial state
toggleAspect('16:9');
saveHistory();
</script>
